[package]
name = "fabricatio-tei"
edition = "2024"

[lib]
crate-type = ["cdylib","rlib"]

[dependencies]
fabricatio-core = { path = "../fabricatio-core" }
fabricatio-constants = { path = "../../crates/fabricatio-constants" }
once_cell = "1.21.4"
pyo3 = { version = "0.28.3" }
pyo3-async-runtimes = { version = "0.28.0", features = ["tokio-runtime"] }
pyo3-stub-gen = { version = "0.22.1", optional = true }
thryd = { path = "../../crates/thryd" }
serde = { version = "1.0.228", features = ["derive"] }
strum = { version = "0.28.0", features = ["derive"] }
futures-util = { version = "0.3.32", default-features = false }
serde_json = "1.0.149"
url = "2.5.8"

[features]
default = ["pyo3/extension-module"]
stubgen = ["dep:pyo3-stub-gen"]