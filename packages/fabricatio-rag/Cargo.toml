[package]
name = "fabricatio-rag"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
pyo3 = { version = "0.27.2" }
serde = { version = "1.0.228", features = ["derive"] }

pyo3-async-runtimes = { version = "0.27.0", features = ["tokio-runtime"] }
tonic-prost = "0.14.2"
tonic = "0.14.2"
prost = "0.14.3"
fabricatio-logger = { path = "../../crates/fabricatio-logger" }
error-mapping = { path = "../../crates/error-mapping", features = ["tonic", "http", "strum", "lancedb"] }
pyo3-stub-gen = "0.17.2"
strum = { version = "0.27.2", features = ["derive"] }
lancedb = { version = "0.23.1", default-features = false }
arrow-array = "57.2.0"
arrow = { version = "57.2.0" }
pythonize = "0.27.0"
arrow-schema = "57.2.0"





[build-dependencies]
tonic-prost-build = "0.14.2"



[features]
default = ["pyo3/extension-module"]
stubgen = []
