[package]
name = "fabricatio-rag"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
pyo3 = { version = "0.28.3" }
serde = { version = "1.0.228", features = ["derive"] }

pyo3-async-runtimes = { version = "0.28.0", features = ["tokio-runtime"] }
tonic-prost = "0.14.5"
tonic = "0.14.5"
prost = "0.14.3"
fabricatio-logger = { workspace = true }
error-mapping = { workspace = true, features = [
    "tonic", "http", "strum", "lancedb", "serde_json", "pythonize",
    "pyo3_cast", "arrow-schema"
] }
pyo3-stub-gen = "0.21.0"
strum = { version = "0.28.0", features = ["derive"] }
lancedb = { version = "0.27.2", default-features = false }
pythonize = "0.28.0"
uuid = { version = "1.23.0", features = ["v7"] }
cached = "0.59.0"
serde_json = { version = "1.0.149", default-features = false }
arrow-array = { version = "57.3.0", default-features = false }
tokio = { version = "1.51.0", default-features = false }
rayon = { version = "1.11.0", default-features = false }
futures-util = { version = "0.3.32", default-features = false }


[build-dependencies]
tonic-prost-build = "0.14.5"



[features]
default = ["pyo3/extension-module"]
stubgen = []

[dev-dependencies]
criterion = "0.8.2"



[[bench]]
name = "schema_bench"
harness = false
