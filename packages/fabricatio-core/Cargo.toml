[package]
name = "fabricatio-core"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
blake3 = "1.8.4"
handlebars = "6.4.0"
pyo3 = { version = "0.28.3" }
pythonize = "0.28.0"
rayon = "1.12.0"
serde_json = "1.0.149"
unicode-segmentation = "1.13.2"
walkdir = "2.5.0"
regex = "1.12"
serde = { version = "1.0.228", features = ["derive"] }
strum = { version = "0.28.0", features = ["derive"] }
whichlang = "0.1.1"
scanner = { path = "../../crates/scanner" }
error-mapping = { path = "../../crates/error-mapping", features = ["handlebars", "pythonize", "thryd", "strum", "std", "postcard", "llm_json", "regex", "serde_json"] }
fabricatio-constants = { path = "../../crates/fabricatio-constants" }
fabricatio-logger = { path = "../../crates/fabricatio-logger" }
fabricatio-config = { path = "../../crates/fabricatio-config" }

thryd = { path = "../../crates/thryd", features = ["pyo3", "pystub"] }

once_cell = "1.21.4"
postcard = { version = "1.1.3", features = ["use-std"] }
pyo3-stub-gen = "0.22.1"
chrono = "0.4.44"
cfg-if = "1.0.4"
pyo3-async-runtimes = { version = "0.28.0", features = ["tokio-runtime"] }
tokio = { version = "1.52.1", features = ["rt-multi-thread"] }
llm_json = "1.0.3"
futures = "0.3.32"


[dev-dependencies]
tempfile = "3.27.0"

[features]
default = ["pyo3/extension-module"]
stubgen = ["fabricatio-logger/stubgen", "fabricatio-config/stubgen"]


