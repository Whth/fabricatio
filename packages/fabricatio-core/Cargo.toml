[package]
name = "fabricatio-core"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
blake3 = "1.8.3"
handlebars = "6.4.0"
pyo3 = { version = "0.28.2" }
pythonize = "0.28.0"
rayon = "1.11.0"
serde_json = "1.0.149"
unicode-segmentation = "1.12.0"
walkdir = "2.5.0"
serde = { version = "1.0.228", features = ["derive"] }
strum = { version = "0.28.0", features = ["derive"] }
whichlang = "0.1.1"
scanner = { path = "../../crates/scanner" }
error-mapping = { path = "../../crates/error-mapping", features = ["handlebars", "pythonize", "thryd", "strum", "std", "postcard"] }
fabricatio-constants = { path = "../../crates/fabricatio-constants" }
fabricatio-logger = { path = "../../crates/fabricatio-logger" }
fabricatio-config = { path = "../../crates/fabricatio-config" }

thryd = { path = "../../crates/thryd", features = ["pyo3", "pystub"] }

once_cell = "1.21.4"
path-clean = "1.0.1"
postcard = { version = "1.1.3", features = ["use-std"] }
pyo3-stub-gen = "0.19.0"
chrono = "0.4.44"
cfg-if = "1.0.4"
pyo3-async-runtimes = { version = "0.28.0", features = ["tokio-runtime"] }
tokio = { version = "1.50.0", features = ["rt-multi-thread"] }


[dev-dependencies]
tempfile = "3.27.0"

[features]
default = ["pyo3/extension-module"]
stubgen = []


