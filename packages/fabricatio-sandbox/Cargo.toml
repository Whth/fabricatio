[package]
name = "fabricatio-sandbox"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
pyo3 = { version = "0.29.0" }
pyo3-stub-gen = { version = "0.22.3", optional = true }
vfs = "0.13.0"
similar = "3.1.1"
thiserror = "2.0"

[features]
default = ["pyo3/extension-module"]
stubgen = ["dep:pyo3-stub-gen"]
