[package]
name = "fabricatio-skill"
edition = "2024"

[lib]
crate-type = ["cdylib","rlib"]

[dependencies]
pyo3 = { version = "0.28.3" }
pyo3-stub-gen = { version = "0.22.2", optional = true }
serde = { version = "1", features = ["derive"] }
serde_yaml2 = "0.1.3"
walkdir = "2"
rayon = "1.12.0"

[features]
default = ["pyo3/extension-module"]
stubgen = []
