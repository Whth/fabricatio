[project]
name = "fabricatio-comfyui"
version = "0.2.1-dev0"
description = "ComfyUI API integration for Fabricatio"
readme = "README.md"
license = "MIT"
authors = [
    { name = "UNK", email = "example@mail.com" }
]
classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: Implementation :: CPython",
    "Typing :: Typed",
]

requires-python = ">=3.12,< 3.15"

dependencies = [
    "fabricatio-core",
    "httpx>=0.28.0",
]

[dependency-groups]
dev = [
    "pytest",
]


[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
sources = ["python"]

[project.urls]
Homepage = "https://github.com/Whth/fabricatio"
Repository = "https://github.com/Whth/fabricatio"
Issues = "https://github.com/Whth/fabricatio/issues"
