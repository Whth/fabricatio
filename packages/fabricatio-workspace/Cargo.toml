[package]
name = "fabricatio-workspace"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]


[dependencies]
blake3 = "1.8.3"
fabricatio-logger = { path = "../../crates/fabricatio-logger" }

git2 = { version = "0.20.4", features = ["vendored-libgit2"], default-features = false }
moka = { version = "0.12.15", features = ["sync"] }

pyo3 = { version = "0.28.2" }
error-mapping = { path = "../../crates/error-mapping", features = ["git2"] }
utils = { path = "../../crates/utils" }
rayon = "1.11.0"
pyo3-stub-gen = { version = "0.20.0" }




[features]
default = ["pyo3/extension-module"]
stubgen = []
