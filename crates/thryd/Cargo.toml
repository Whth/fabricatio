[package]
name = "thryd"
version = "0.1.0"
edition = "2024"
description = "A light weight, embeded llm request router, with cache."
authors.workspace = true
license-file.workspace = true
repository.workspace = true

[dependencies]
async-openai = { version = "0.33.1", features = ["completions", "embedding-types"] }
async-trait = "0.1.89"
cached = "0.58.0"
eventsource-stream = "0.2.3"
futures = "0.3.32"
http = "1.4.0"
moka = { version = "0.12.14", features = ["sync"] }
once_cell = "1.21.4"
reqwest = { version = "0.13.2", features = ["json", "stream"] }
secrecy = "0.10.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
sled = "0.34.7"
strum = { version = "0.28.0", features = ["derive"] }
strum_macros = "0.28.0"
thiserror = "2.0.18"
tiktoken-rs = "0.9.1"
tokio = "1.50.0"
tracing = "0.1.44"
url = { version = "2.5.8", features = ["serde"] }
